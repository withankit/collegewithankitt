<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #bcbc25, #650cbe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    width: 300px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* Profile Image */
.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    margin-bottom: 10px;
}

/* Name */
h2 {
    margin: 10px 0;
}

/* Buttons */
.btn {
    display: block;
    margin: 15px 0;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

/* Instagram */
.instagram {
    background: linear-gradient(45deg, #feda75, #d62976, #962fbf);
}

/* YouTube */
.youtube {
    background: #ff0000;
}

/* Hover */
.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>

</head>
<body>

<div class="container">

    <!-- DP -->
    <img src="ankit.jpg" class="profile-img">

    <h2>Ankit mishra</h2>
    <p>Follow me on social media 🚀</p>

    <!-- Instagram -->
    <a href="https://www.instagram.com/collegewithankit?igsh=MXM4dzUycDI5bmtwZA==" target="_blank" class="btn instagram">
        📸 Instagram
    </a>
    <a href="https://www.instagram.com/ankittt_mishra_?igsh=MWExcW5kaGhsZnFsOQ==" target="_blank" class="btn instagram">
        📸 second insta id 
    </a>

    <!-- YouTube -->
    <a href="https://youtube.com/@collegewithankit?si=vjh0WF07ibqZwkqG" target="_blank" class="btn youtube">
        ▶️ YouTube
    </a>

</div>

</body>
</html>
